{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div id="content-main">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <fieldset class="module aligned">
      <h2>Import Theme ZIP</h2>
      <p>Upload a theme ZIP file containing <code>theme.json</code>, an <code>icons/</code> directory, and optional logo/banner images.</p>
      <div class="form-row">
        <label for="id_theme_zip">Theme ZIP file:</label>
        <input type="file" name="theme_zip" id="id_theme_zip" accept=".zip" required>
      </div>
    </fieldset>
    <div class="submit-row">
      <input type="submit" value="Import Theme" class="default">
      <a href="{% url 'admin:viewer_themeprofile_changelist' %}" class="button cancel-link">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% extends "base_anon.html" %}

{% block title %}Sign out — GeoRidge Platform{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body text-center p-4">
      <h5>Sign out</h5>
      <p class="text-muted">Are you sure you want to sign out?</p>
      <form method="post" action="{{ tenant_base }}{% url 'accounts:logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sign out</button>
        <a href="{{ tenant_base }}/" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}

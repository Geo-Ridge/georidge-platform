<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
<title>{{ project.name }} — GeoRidge Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.4.0/ol.css">
<link href="{% static 'viewer/css/viewer.css' %}" rel="stylesheet">
<link href="{% static 'viewer/css/layouts/qwc2.css' %}" rel="stylesheet">
<style>
  :root {
    {% if theme_css_vars %}
    {% for key, value in theme_css_vars.items %}
    --{{ key }}: {{ value }};
    {% endfor %}
    {% endif %}
  }
  body { margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; background: var(--background); }
  .viewer-body { display: flex; flex: 1; overflow: hidden; }
  #map-container { flex: 1; position: relative; }
</style>
</head>
<body>
<div id="qwc2-navbar" class="qwc2-navbar">
  <div class="qwc2-navbar-left">
    <button id="qwc2-hamburger" class="qwc2-navbar-btn" title="Toggle panel">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/hamburger-menu.{{ icon_ext }}" width="22" height="22" alt="Menu">
    </button>
    <span class="qwc2-navbar-title">{{ project.name }}</span>
  </div>
  <div class="qwc2-navbar-center">
    <div class="qwc2-search-wrap"></div>
  </div>
  <div class="qwc2-navbar-right">
    <button class="qwc2-navbar-btn" data-tool="identify" onclick="window.setTool('identify')" title="Identify">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/identify.{{ icon_ext }}" width="18" height="18" alt="Identify">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.zoomIn()" title="Zoom In">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/zoom-in.{{ icon_ext }}" width="18" height="18" alt="Zoom In">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.zoomOut()" title="Zoom Out">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/zoom-out.{{ icon_ext }}" width="18" height="18" alt="Zoom Out">
    </button>
    <button class="qwc2-navbar-btn" data-tool="zoomrect" onclick="window.setTool('zoomrect')" title="Zoom to Rectangle">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/zoom-rect.{{ icon_ext }}" width="18" height="18" alt="Zoom to Rectangle">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.homeExtent()" title="Full Extent">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/full-extent.{{ icon_ext }}" width="18" height="18" alt="Full Extent">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.printMap()" title="Print">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/print.{{ icon_ext }}" width="18" height="18" alt="Print">
    </button>
    <span class="qwc2-navbar-sep"></span>
    <button class="qwc2-navbar-btn" data-tool="measure-distance" onclick="window.setTool('measure-distance')" title="Measure Distance">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/measure-distance.{{ icon_ext }}" width="18" height="18" alt="Measure Distance">
    </button>
    <button class="qwc2-navbar-btn" data-tool="measure-area" onclick="window.setTool('measure-area')" title="Measure Area">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/measure-area.{{ icon_ext }}" width="18" height="18" alt="Measure Area">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.measureClear()" title="Clear Measurements">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/clear.{{ icon_ext }}" width="18" height="18" alt="Clear">
    </button>
    <button class="qwc2-navbar-btn" onclick="window.qwc2ClearHighlight()" title="Clear Highlight">
      <img src="{% static 'viewer/icons/' %}{{ icon_set }}/trash.{{ icon_ext }}" width="18" height="18" alt="Clear Highlight">
    </button>
    <div class="qwc2-navbar-dropdown">
      <button class="qwc2-navbar-btn dropdown-toggle" data-bs-toggle="dropdown" title="More tools">
        <img src="{% static 'viewer/icons/' %}{{ icon_set }}/three-dots.{{ icon_ext }}" width="18" height="18" alt="More">
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="#" onclick="event.preventDefault();window.measureToggleUnits()">Toggle Units</a></li>
        <li><a class="dropdown-item" href="#" onclick="event.preventDefault();window.qwc2Geolocate()">Locate Me</a></li>
      </ul>
    </div>
  </div>
</div>
<div class="viewer-body">
  <div id="qwc2-slide-panel" class="qwc2-slide-panel">
    <div class="qwc2-slide-header">
      <div class="qwc2-slide-tabs">
        <button class="qwc2-slide-tab active" data-tab="layers">Layers</button>
        <button class="qwc2-slide-tab" data-tab="legend">Legend</button>
      </div>
    </div>
    <div class="qwc2-slide-body">
      <div id="qwc2-slide-layers" class="qwc2-slide-content active">
        <div id="layer-tree" class="dock-tree"></div>
      </div>
      <div id="qwc2-slide-legend" class="qwc2-slide-content">
        <div id="legend-content" class="info-scroll">
          <p class="text-muted small">Layer legend will appear here.</p>
        </div>
      </div>
    </div>
  </div>
  <div id="qwc2-backdrop" class="qwc2-backdrop" style="display:none;"></div>
  <div id="map-container">
    <div id="map-canvas"></div>
    <div id="identify-popup-container" class="identify-popup-container"></div>
    <div id="basemap-selector" class="basemap-selector">
      <button id="basemap-toggle" class="basemap-toggle" title="Select Base Map">
        <img id="basemap-globe-icon" src="{% static 'viewer/icons/' %}{{ icon_set }}/globe.{{ icon_ext }}" width="20" height="20" alt="Base Map">
      </button>
      <div id="basemap-panel" class="basemap-panel" style="display:none;">
        <div class="basemap-panel-header">Base Map</div>
        <div id="basemap-list" class="basemap-list"></div>
      </div>
    </div>
  </div>
</div>
{% if not theme or theme.show_statusbar %}
<div id="status-bar">
  <span id="scale-display">Scale: —</span>
  <span id="coords-display">Coordinates: —</span>
  <span id="crs-display">CRS: EPSG:3857</span>
</div>
{% endif %}
<script src="https://cdn.jsdelivr.net/npm/ol@v10.4.0/dist/ol.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script id="map-config" type="application/json">{
  "wmsUrl": "{{ wms_url|escapejs }}",
  "layerName": "{{ wms_layer_name|escapejs }}",
  "projectPk": {{ project.pk }},
  "extent": {{ extent_json|safe }},
  "layerTree": {{ layer_tree_json|safe }},
  "tenantBase": "{{ tenant_base }}",
  "iconBase": "{% filter escapejs %}{% static 'viewer/icons/' %}{{ icon_set }}/{% endfilter %}",
  "iconExt": "{{ icon_ext }}",
  "baseMaps": {{ base_maps_json|safe }}
}</script>
<script src="{% static 'viewer/js/layer-manager.js' %}"></script>
<script src="{% static 'viewer/js/identify-manager.js' %}"></script>
<script src="{% static 'viewer/js/panel-resize.js' %}"></script>
<script src="{% static 'viewer/js/map-core.js' %}"></script>
<script src="{% static 'viewer/js/base-map-selector.js' %}"></script>
<script src="{% static 'viewer/js/measure-tools.js' %}"></script>
<script src="{% static 'viewer/js/search-manager.js' %}"></script>
<script src="{% static 'viewer/js/identify-popup.js' %}?v=3"></script>
<script src="{% static 'viewer/js/qwc2-navbar.js' %}"></script>
<script src="{% static 'viewer/js/qwc2-slide-panel.js' %}"></script>
<script>
(function() {
  var panel = document.getElementById('qwc2-slide-panel');
  if (panel) {
    window.createResizeHandle(panel, { minWidth: 200, maxWidthPct: 0.5 });
  }
})();
</script>
</body>
</html>

{% extends "base.html" %}

{% block title %}Delete {{ project.name }} — GeoRidge Platform{% endblock %}

{% block page_title %}<h5 class="mb-0">Delete Project</h5>{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body text-center p-4">
        <i class="bi bi-exclamation-triangle fs-1 text-danger mb-3 d-block"></i>
        <h5>Are you sure?</h5>
        <p class="text-muted">This will permanently delete <strong>{{ project.name }}</strong> and its file.</p>
        <form method="post"
              hx-post="{{ tenant_base }}{% url 'projects:delete' project.pk %}"
              hx-target="this"
              hx-swap="outerHTML">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Delete</button>
           <a href="{{ tenant_base }}{% url 'projects:detail' project.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <title>{% block title %}GeoRidge Platform{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/admin-theme.css' %}" rel="stylesheet">
  <meta name="csrf-token" content="{{ csrf_token }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="d-flex" style="min-height: 100vh;">
    {% include "includes/sidebar.html" %}
    <div class="d-flex flex-column flex-grow-1">
      {% include "includes/topbar.html" %}
      <main class="flex-grow-1 page-content" id="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.body.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-CSRFToken'] = document.querySelector('[name=csrf-token]').content;
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/ol@v10.4.0/dist/ol.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
